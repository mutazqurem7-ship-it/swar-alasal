<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>العروض الخاصة | سوار العسل</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #fdfcfb 0%, #fff0f5 100%); min-height: 100vh; }
        .offer-banner { background: #d4af37; color: white; padding: 40px; border-radius: 20px; margin-bottom: 30px; text-align: center; }
        .product-card { background: white; border: 2px solid #d4af37; border-radius: 20px; padding: 15px; transition: 0.3s; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="offer-banner">
        <h1>🔥 عروض سوار العسل الحصرية 🔥</h1>
        <p>خصومات خاصة لفترة محدودة على أفضل المنتجات</p>
    </div>

    <div class="row row-cols-2 row-cols-md-4 g-3">
        {% for product in products %}
        <div class="col">
            <div class="product-card text-center">
                {% if product.image %}
                <img src="{{ product.image.url }}" class="img-fluid rounded mb-2" style="height: 120px;">
                {% endif %}
                <h5>{{ product.name }}</h5>
                <p class="text-danger fw-bold">خصم خاص!</p>
                <button class="btn btn-warning w-100">اطلب الآن</button>
            </div>
        </div>
        {% endfor %}
    </div>
    <div class="text-center mt-4">
        <a href="/" class="btn btn-outline-secondary">العودة للرئيسية</a>
    </div>
</div>

</body>
</html>
