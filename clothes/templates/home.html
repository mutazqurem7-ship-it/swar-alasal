<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوار العسل | Swar Al-Asal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #fdfcfb 0%, #f7f3e9 100%);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            min-height: 100vh;
        }
        .navbar { background-color: #d4af37 !important; }
        .card { 
            border-radius: 20px; 
            border: none; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-10px); }
        .btn-success { background-color: #25d366; border: none; }
        .price-tag { color: #d4af37; font-weight: bold; font-size: 1.5rem; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark mb-5 p-3">
        <div class="container justify-content-center">
            <h2 class="text-white fw-bold">مرحباً بكم في سوار العسل 🍯</h2>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            {% for product in products %}
            <div class="col-md-4 col-sm-6 mb-4">
                <div class="card h-100 p-2">
                    {% if product.image %}
                    <img src="{{ product.image.url }}" class="card-img-top rounded-3" style="height: 300px; object-fit: cover;">
                    {% endif %}
                    <div class="card-body text-center">
                        <h4 class="card-title">{{ product.name }}</h4>
                        <p class="price-tag">{{ product.price }} د.أ</p>
                        <a href="https://wa.me/962785085166?text=مرحباً، أريد طلب القطعة: {{ product.name }} بسعر {{ product.price }} د.أ" 
                           class="btn btn-success w-100 py-2 rounded-pill" target="_blank">
                           اضغط للطلب عبر واتساب
                        </a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <footer class="text-center mt-5 p-4 text-muted">
        <p>© 2026 سوار العسل - جميع الحقوق محفوظة</p>
    </footer>

</body>
</html>
