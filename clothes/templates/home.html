<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوار العسل | متجر الأناقة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* الخلفية المتدرجة والشعار المائي */
        body { 
            background: linear-gradient(135deg, #fdfcfb 0%, #f7f3e9 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            position: relative;
        }

        body::before {
            content: "سوار العسل";
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 8rem;
            color: rgba(212, 175, 55, 0.05); 
            font-weight: bold;
            z-index: -1;
            pointer-events: none;
            white-space: nowrap;
        }

        .product-card { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px; 
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .product-card:hover { transform: translateY(-5px); }
        .cart-btn { position: fixed; bottom: 30px; right: 30px; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .navbar { background: rgba(255, 255, 255, 0.9) !important; border-bottom: 2px solid #d4af37; }
    </style>
</head>
<body>

<div class="cart-btn">
    <button class="btn btn-success btn-lg rounded-pill px-4" onclick="sendWhatsApp()">
        🛒 السلة (<span id="cart-count">0</span>)
    </button>
</div>

<nav class="navbar navbar-light mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">سوار العسل 🍯</a>
        <a href="/offers/" class="btn btn-outline-danger btn-sm">العروض 🔥</a>
    </div>
</nav>

<div class="container">
    <div class="row row-cols-2 row-cols-md-4 g-3">
        {% for product in products %}
        <div class="col">
            <div class="product-card p-2 text-center">
                {% if product.image %}
                <img src="{{ product.image.url }}" class="img-fluid mb-2" style="height: 150px; object-fit: cover; width: 100%; border-radius: 15px;">
                {% endif %}
                <h6>{{ product.name }}</h6>
                <p class="text-primary fw-bold">{{ product.price }} د.أ</p>
                <button class="btn btn-outline-success btn-sm w-100" onclick="addToCart('{{ product.name }}', {{ product.price }})">إضافة للسلة</button>
                {% if user.is_staff %}
                <button class="btn btn-danger btn-sm w-100 mt-1" onclick="this.closest('.col').style.display='none'">إخفاء القطعة</button>
                {% endif %}
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<script>
    let cart = [];
    function addToCart(name, price) {
        cart.push({name, price});
        document.getElementById('cart-count').innerText = cart.length;
        alert('تم إضافة ' + name + ' إلى السلة!');
    }
    function sendWhatsApp() {
        if(cart.length === 0) { alert('السلة فارغة!'); return; }
        let msg = "مرحباً، أريد طلب القطع التالية:%0A";
        let total = 0;
        cart.forEach(item => { msg += "- " + item.name + " (" + item.price + " د.أ)%0A"; total += item.price; });
        msg += "%0Aالمجموع: " + total + " د.أ";
        window.open('https://wa.me/962785085166?text=' + msg);
    }
</script>
</body>
</html>
