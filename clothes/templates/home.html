<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوار العسل | Swar Al-Asal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { position: relative; background-color: #fcfcfc; font-family: Tahoma, sans-serif; }
        /* تصميم الخلفية المائية */
        body::after {
            content: "Swar Al-Asal";
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 8rem; color: rgba(200, 200, 200, 0.1);
            pointer-events: none; z-index: -1;
        }
        .card:hover { transform: translateY(-5px); transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">سوار العسل للأزياء</a>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            {% for product in products %}
            <div class="col-6 col-md-3 mb-4">
                <div class="card h-100 shadow-sm border-0">
                    {% if product.image %}
                    <img src="{{ product.image.url }}" class="card-img-top" style="height: 250px; object-fit: cover;">
                    {% endif %}
                    
                    <div class="card-body text-center">
                        <h5 class="card-title">{{ product.name }}</h5>
                        <p class="text-primary fw-bold fs-4">{{ product.price }} د.أ</p>
                        
                        <a href="https://wa.me/962785085166?text=مرحباً، أريد طلب القطعة التالية:%0A%0Aاسم القطعة: {{ product.name }}%0Aالسعر: {{ product.price }} د.أ%0A%0Aيرجى تأكيد الطلب." 
                           class="btn btn-success w-100 mt-2" target="_blank">
                           اطلب الآن عبر واتساب
                        </a>
                    </div>
                </div>
            </div>
            {% empty %}
            <div class="text-center mt-5">
                <h3>لا توجد منتجات حالياً</h3>
            </div>
            {% endfor %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5ش.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
